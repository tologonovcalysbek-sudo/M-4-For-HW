{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Мои публикации</h2>
    <hr>
    {% if posts %}
        <div class="row">
            {% for post in posts %}
                <div class="col-md-6 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">{{ post.title }}</h5>
                            <p class="card-text">{{ post.content|truncatewords:20 }}</p>
                        </div>
                        <div class="card-footer d-flex justify-content-between bg-transparent border-top-0">
                            <!-- Кнопка Редактировать -->
                            <a href="{% url 'edit_post' post.pk %}" class="btn btn-warning btn-sm">Редактировать</a>
                            
                            <!-- Кнопка Удалить -->
                            <a href="{% url 'delete_post' post.pk %}" class="btn btn-danger btn-sm">Удалить</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="alert alert-info">У вас пока нет созданных публикаций.</div>
    {% endif %}
</div>
{% endblock %}
