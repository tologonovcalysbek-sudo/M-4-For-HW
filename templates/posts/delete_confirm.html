{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card border-danger shadow">
        <div class="card-header bg-danger text-white">
            <h4 class="m-0">Подтверждение удаления</h4>
        </div>
        <div class="card-body text-center">
            <p class="fs-5">Вы уверены, что хотите навсегда удалить публикацию <strong>"{{ post.title }}"</strong>?</p>
            <form method="POST" class="mt-4">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4 me-2">Да, удалить</button>
                <a href="{% url 'user_posts' %}" class="btn btn-secondary px-4">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
