{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 30px;">
    <h2>Создать новую категорию</h2>
    <hr>
    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" class="btn btn-primary" style="background: #0d6efd; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
            Создать категорию
        </button>
    </form>
    <br>
    <a href="{% url 'posts' %}" style="color: gray; text-decoration: none;">← Вернуться назад</a>
</div>
{% endblock %}
